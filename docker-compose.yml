services:
  mysql:
    image: mysql:8.0
    container_name: codequest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: codequest_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:6-alpine
    container_name: codequest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    image: tomcat:9.0-jdk17-temurin
    container_name: codequest-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./target/platform:/usr/local/tomcat/webapps/ROOT
      - ./docker/db.properties:/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/db.properties:ro
      - ./data/avatars:/usr/local/tomcat/webapps/ROOT/uploads/avatars

volumes:
  mysql_data:
  redis_data:
